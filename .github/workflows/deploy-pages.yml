name: Deploy to GitHub Pages

# Veröffentlicht website/ als GitHub Pages bei jedem Push auf main
# der Dateien in website/** berührt — oder manuell via workflow_dispatch.
on:
  push:
    branches: [main]
    paths: ['website/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Nur ein Deploy gleichzeitig — laufende Deploys werden abgebrochen wenn ein neuer startet.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: GitHub Pages konfigurieren
        uses: actions/configure-pages@v5

      - name: website/ als Pages-Artifact hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./website

      - name: Deployen
        id: deployment
        uses: actions/deploy-pages@v4
