<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <script>(function(){try{var t=localStorage.getItem("theme");document.documentElement.setAttribute("data-theme",t==="light"?"light":"dark");}catch(e){document.documentElement.setAttribute("data-theme","dark");}})()</script>
    <script defer src="../js/status.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO (EN/DE-Titel als Standard, EN immer vorhanden) -->
    <title>{{TITLE}} | Yusef Bach</title>
    <meta name="description" content="{{EXCERPT}}" />
    <meta name="author" content="Yusef Bach" />
    <link rel="icon" type="image/png" href="../images/ui/logo.png" />
    <link rel="canonical" href="https://yusefbach.de/thoughts/{{SLUG}}.html" />

    <!-- Open Graph -->
    <meta property="og:type" content="article" />
    <meta property="og:title" content="{{TITLE}}" />
    <meta property="og:description" content="{{EXCERPT}}" />
    <meta property="og:image" content="{{OG_IMAGE}}" />
    <meta property="og:url" content="https://yusefbach.de/thoughts/{{SLUG}}.html" />
    <meta property="article:published_time" content="{{PUBLISHED_AT_ISO}}" />

    <!-- JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BlogPosting",
      "headline": {{TITLE_JSON}},
      "datePublished": "{{PUBLISHED_AT_ISO}}",
      "author": { "@type": "Person", "name": "Yusef Bach", "alternateName": "يوسف الباش", "url": "https://yusefbach.de" },
      "image": "{{OG_IMAGE}}",
      "url": "https://yusefbach.de/thoughts/{{SLUG}}.html"
    }
    </script>

    <link rel="preload" as="font" type="font/woff2" href="../fonts/InterVariable.woff2" crossorigin />


    <link rel="stylesheet" href="../css/fonts.css" />


    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/pages/thoughts.css" />
    <noscript><style>body { visibility: visible !important; }</style></noscript>
  </head>

  <body>
    <a href="#main-content" class="skip-link" data-i18n="a11y_skip_link">Zum Hauptinhalt springen</a>
    <app-header base-path=".."></app-header>
    <main id="main-content">

    <!-- ── Post Hero (sprachneutral) ────────────────────────────────────────── -->
    <header class="thought-post-hero">
      {{COVER_BLOCK}}
      <div class="container">
        <a href="index.html" class="thought-back-link" data-i18n="thoughts_back">← Zurück zu Gedanken</a>
        {{TAGS_HTML}}
      </div>
    </header>

    <!-- ── Post Body ─────────────────────────────────────────────────────────── -->
    <article class="thought-post-body">
      <div class="container">

        <!-- Fallback-Badge: wird per Inline-Script ein-/ausgeblendet -->
        <div class="thought-lang-fallback-badge" id="lang-fallback-badge" hidden>
          <span data-i18n="thoughts_fallback_prefix">Nur verfügbar auf</span>
          <strong id="lang-fallback-code">EN</strong>
        </div>

        <!-- Alle Sprachversionen (Titel + Datum + Content) -->
        {{LANG_BLOCKS}}

        <!-- ── Share ──────────────────────────────────────────────────────── -->
        <div class="thought-post-share">
          <button
            class="share-btn share-copy"
            onclick="navigator.clipboard.writeText(window.location.href).then(function(){var b=event.target.closest('button');b.classList.add('copied');setTimeout(function(){b.classList.remove('copied')},2000)})"
          >
            <span class="share-icon">🔗</span>
            <span data-i18n="thoughts_share_copy">Link kopieren</span>
            <span class="share-copied-label" data-i18n="thoughts_share_copied">Kopiert!</span>
          </button>
          <a
            class="share-btn share-linkedin"
            href="https://www.linkedin.com/sharing/share-offsite/?url=https%3A%2F%2Fyusefbach.de%2Fthoughts%2F{{SLUG}}.html"
            target="_blank"
            rel="noopener noreferrer"
          >
            <span class="share-icon">in</span>
            <span data-i18n="thoughts_share_linkedin">Teilen</span>
          </a>
        </div>

        <!-- ── Back ───────────────────────────────────────────────────────── -->
        <div class="thought-post-footer-nav">
          <a href="index.html" class="thought-back-link-bottom" data-i18n="thoughts_back">← Zurück zu Gedanken</a>
        </div>
      </div>
    </article>

    <!-- ── Lightbox ──────────────────────────────────────────────────────────── -->
    <div id="lightbox-overlay" class="lightbox-overlay" style="display:none;" aria-modal="true" role="dialog" aria-label="Bild-Lightbox">
      <button class="lightbox-close" id="lightbox-close" aria-label="Schließen">✕</button>
      <img id="lightbox-img" class="lightbox-img" src="" alt="" />
    </div>

    </main>

        <app-footer base-path=".."></app-footer>

    <!-- ── Sprach-Switch (inline, kein externes JS nötig) ────────────────────── -->
    <script>
    (function() {
      var AVAILABLE = {{AVAILABLE_LANGS}};

      function activate() {
        var preferred = '';
        try { preferred = window.__PAGE_LANG__ || 'de'; } catch(e) { preferred = 'de'; }

        var blocks = document.querySelectorAll('.thought-lang-block');
        var found = null;

        blocks.forEach(function(b) {
          b.hidden = true;
          if (b.dataset.lang === preferred) found = b;
        });

        var badge     = document.getElementById('lang-fallback-badge');
        var badgeCode = document.getElementById('lang-fallback-code');

        if (found) {
          found.hidden = false;
          if (badge) badge.hidden = true;
          // RTL für Arabisch
          if (preferred === 'ar') {
            document.documentElement.setAttribute('dir', 'rtl');
            document.documentElement.lang = 'ar';
          } else {
            document.documentElement.removeAttribute('dir');
            document.documentElement.lang = preferred;
          }
        } else {
          // Fallback: EN anzeigen
          var enBlock = document.querySelector('.thought-lang-block[data-lang="en"]');
          if (enBlock) enBlock.hidden = false;
          document.documentElement.removeAttribute('dir');
          document.documentElement.lang = 'en';
          if (badge && badgeCode) {
            badge.hidden = false;
            badgeCode.textContent = 'EN';
          }
        }
      }

      document.addEventListener('DOMContentLoaded', activate);
      window.addEventListener('languagechange', activate);

      // Sicherstellen dass AVAILABLE_LANGS nicht unused ist
      void AVAILABLE;
    })();
    </script>

    <!-- Scripts -->
    <script defer src="../js/components/AppHeader.js"></script>
    <script defer src="../js/components/AppFooter.js"></script>
    <script defer src="../js/lightbox.js"></script>
    <script defer src="../js/bot.js"></script>
    <script defer src="../js/script.js"></script>
  </body>
</html>
